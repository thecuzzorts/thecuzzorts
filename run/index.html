<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SNE2PKC43Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SNE2PKC43Y');
  </script>
  <meta charset="utf-8">
  <title>Running | The Cuzzorts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../turkey-hunting/css/jquery-jvectormap-2.0.3.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="../css/site-chrome.css">
  <link rel="stylesheet" href="../css/section-labels.css">
</head>
<body>

  <header class="site-header">
    <p class="site-title"><a class="home-link" href="../index.html">The Cuzzorts</a> &mdash; Running</p>
    <p class="site-tagline">Josh's race log &mdash; chasing finish lines across the country</p>
    <div role="navigation">
      <nav>
        <ul>
          <li><a href="#map">Map</a></li>
          <li><a href="#races">Races</a></li>
          <li><a href="#trend">5K Trend</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <div class="page-intro">
      <h1>Running</h1>
      <p>Tracking every finish line, one state at a time</p>
    </div>

    <!-- Map -->
    <div class="section-panel" id="map">
      <h3 class="section-heading">Map</h3>
      <div class="map-card">
        <div class="run-stats">
          <div class="run-stat">
            <span class="run-stat-num" id="raceCount">0</span>
            <span class="run-stat-label">Total Races</span>
          </div>
          <div class="run-stat-pipe"></div>
          <div class="run-stat">
            <span class="run-stat-num" id="stateCount">0</span>
            <span class="run-stat-label">of 50 States</span>
          </div>
          <div class="run-stat-pipe"></div>
          <div class="run-stat-breakdown" id="typeBreakdown"></div>
        </div>
        <div class="map-container us-map">
          <div class="map" id="joshMap"></div>
        </div>
      </div>
    </div>

    <!-- Races -->
    <div class="section-panel" id="races">
      <h3 class="section-heading">Races</h3>
      <div class="race-sort-toggle" id="raceSortToggle">
        <button class="race-sort-btn active" data-sort="state">By State</button>
        <button class="race-sort-btn" data-sort="date">By Date</button>
      </div>
      <div class="races-card" id="racesCard"></div>
    </div>

    <!-- 5K Trend -->
    <div class="section-panel" id="trend">
      <h3 class="section-heading">5K Trend</h3>
      <div class="trend-card" id="trendCard"></div>
    </div>

  </main>

  <footer>
    <p><script>document.write(new Date().getFullYear())</script> &copy; The Cuzzorts &mdash; <a href="../index.html">Home</a></p>

  <script src="../turkey-hunting/js/jquery-jvectormap-us-lcc.js"></script>

  <script src="data/races-josh.js"></script>
  <script src="js/app.js"></script>

  <script src="../js/site-nav.js"></script>
  <script src="../js/section-labels.js"></script>

</body>
</html>
