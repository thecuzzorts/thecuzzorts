<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SNE2PKC43Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SNE2PKC43Y');
  </script>
  <meta charset="utf-8">
  <title>Disney Parks | The Cuzzorts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The Cuzzorts tracking Disney theme parks around the world by family member.">
  <meta property="og:title" content="Disney Parks | The Cuzzorts" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.thecuzzorts.com/disney/" />
  <meta property="og:image" content="https://www.thecuzzorts.com/images/family-hero.jpg" />
  <link rel="stylesheet" href="css/styles.css?v=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/site-chrome.css">
  <link rel="stylesheet" href="../css/section-labels.css">
</head>
<body>

  <header class="site-header">
    <p class="site-title"><a class="home-link" href="../index.html">The Cuzzorts</a> &mdash; Disney Parks</p>
    <p class="site-tagline">Tracking Disney theme parks around the world</p>
    <div role="navigation">
      <nav>
        <ul>
          <li><a href="#photos">Photos</a></li>
          <li><a href="#map">Map</a></li>
          <li><a href="#parks">Parks</a></li>
          <li><a href="#bucket">Bucket List</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <div class="page-intro">
      <h1>Disney Parks</h1>
      <p>Theme parks around the world &mdash; tracked by family member</p>
    </div>

    <!-- Photos + Map share a row on desktop, stack on mobile -->
    <div class="photos-map-row">

      <!-- Photos -->
      <div class="pm-col pm-photos">
        <h3 class="section-heading" id="photos">Photos</h3>
        <div class="combined-card" id="photos-card">
          <div class="slideshow-wrap">
            <!-- Add more photos by dropping images in images/disney/ and copying an
                 <img> line below. The alt text becomes the caption. -->
            <div class="disney-slideshow" id="disneySlideshow">
              <img class="is-active" loading="lazy" src="../images/disney/Disneyland-Park-California.jpg" alt="Disneyland Park, California">
              <img loading="lazy" src="../images/disney/Disneyland-California-Adventure.jpg" alt="Disney California Adventure">
            </div>
            <div class="slideshow-controls">
              <a class="prev" role="button" tabindex="0" aria-label="Previous photo">&#8592;</a>
              <div class="cycle-caption"></div>
              <a class="next" role="button" tabindex="0" aria-label="Next photo">&#8594;</a>
            </div>
          </div>
        </div>
      </div><!-- /pm-photos -->

      <!-- Map -->
      <div class="pm-col pm-map">
        <h3 class="section-heading" id="map">Map</h3>
        <div class="combined-card" id="map-card">
          <div class="map-filters" id="mapFilters">
            <button class="map-filter-btn active" data-filter="whole-family">All</button>
            <button class="map-filter-btn" data-filter="anyone">Anyone</button>
            <button class="map-filter-btn" data-filter="josh">Josh</button>
            <button class="map-filter-btn" data-filter="sam">Sam</button>
            <button class="map-filter-btn" data-filter="ellie">Ellie</button>
            <button class="map-filter-btn" data-filter="tilly">Tilly</button>
            <button class="map-filter-btn" data-filter="poppy">Poppy</button>
          </div>
          <div id="disneyMap"></div>
          <div class="map-legend">
            <span class="legend-dot visited" id="legendVisited"></span> Visited
            <span class="legend-sep">·</span>
            <span class="legend-dot unvisited"></span> Not yet visited
          </div>
        </div>
      </div><!-- /pm-map -->

    </div><!-- /photos-map-row -->

    <!-- Parks Visited -->
    <div class="section-panel" id="parks">
      <h3 class="section-heading">Parks Visited</h3>
      <div class="person-filters" id="parksFilters"></div>
      <div class="park-card" id="parksCard"></div>
    </div><!-- /section-panel parks -->

    <!-- Bucket List -->
    <div class="section-panel">
      <h3 class="section-heading" id="bucket">Bucket List</h3>
      <div class="combined-card" id="bucket-card">
      </div>
    </div><!-- /section-panel bucket -->

  </main>

  <footer>
    <p><script>document.write(new Date().getFullYear())</script> &copy; The Cuzzorts &mdash; <a href="../index.html">Home</a></p>
  </footer>

  <!-- Data files — one per person -->
  <script src="data/disney-visited-josh.js"></script>
  <script src="data/disney-visited-sam.js"></script>
  <script src="data/disney-visited-ellie.js"></script>
  <script src="data/disney-visited-tilly.js"></script>
  <script src="data/disney-visited-poppy.js"></script>

  <!-- Map library -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App logic -->
  <script src="js/app.js?v=1"></script>

  <!-- Photos: slideshow + full-screen lightbox -->
  <script src="js/photos.js"></script>

  <!-- Global cross-site nav -->
  <script src="../js/site-nav.js"></script>

  <!-- Shared section-label enhancer -->
  <script src="../js/section-labels.js"></script>

</body>
</html>
