<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>National Parks | The Cuzzorts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The Cuzzorts tracking all 63 US National Parks by family member.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1><a class="home-link" href="../index.html">The Cuzzorts</a> — National Parks</h1>
    <p>Tracking all 63 US National Parks by family member</p>
  </header>

  <main>

    <!-- Family combined card -->
    <p class="section-heading">Family</p>
    <div class="combined-card" id="family-card">
      <h2>Family Combined</h2>
      <p class="count" id="familyParksCount">0 of 63 national parks visited by anyone</p>
    </div>

    <!-- Josh & Sam -->
    <p class="section-heading">Josh &amp; Sam</p>
    <div class="person-grid grid-2col">

      <div class="person-card" data-person="josh" id="josh-card">
        <button class="expand-btn" aria-label="Expand">
          <svg viewBox="0 0 14 14"><line x1="1" y1="4" x2="13" y2="4"/><line x1="1" y1="10" x2="13" y2="10"/></svg>
        </button>
        <h2>Josh</h2>
        <p class="count">Loading&hellip;</p>
      </div>

      <div class="person-card" data-person="sam" id="sam-card">
        <button class="expand-btn" aria-label="Expand">
          <svg viewBox="0 0 14 14"><line x1="1" y1="4" x2="13" y2="4"/><line x1="1" y1="10" x2="13" y2="10"/></svg>
        </button>
        <h2>Sam</h2>
        <p class="count">Loading&hellip;</p>
      </div>

    </div>

    <!-- Kids -->
    <p class="section-heading">The Kids</p>
    <div class="person-grid grid-3col">

      <div class="person-card" data-person="ellie" id="ellie-card">
        <button class="expand-btn" aria-label="Expand">
          <svg viewBox="0 0 14 14"><line x1="1" y1="4" x2="13" y2="4"/><line x1="1" y1="10" x2="13" y2="10"/></svg>
        </button>
        <h2>Ellie</h2>
        <p class="count">Loading&hellip;</p>
      </div>

      <div class="person-card" data-person="tilly" id="tilly-card">
        <button class="expand-btn" aria-label="Expand">
          <svg viewBox="0 0 14 14"><line x1="1" y1="4" x2="13" y2="4"/><line x1="1" y1="10" x2="13" y2="10"/></svg>
        </button>
        <h2>Tilly</h2>
        <p class="count">Loading&hellip;</p>
      </div>

      <div class="person-card" data-person="poppy" id="poppy-card">
        <button class="expand-btn" aria-label="Expand">
          <svg viewBox="0 0 14 14"><line x1="1" y1="4" x2="13" y2="4"/><line x1="1" y1="10" x2="13" y2="10"/></svg>
        </button>
        <h2>Poppy</h2>
        <p class="count">Loading&hellip;</p>
      </div>

    </div>

  </main>

  <footer>
    <p><script>document.write(new Date().getFullYear())</script> &copy; The Cuzzorts &mdash; <a href="../index.html">Home</a></p>
  </footer>

  <!-- Data files — one per person -->
  <script src="data/parks-visited-josh.js"></script>
  <script src="data/parks-visited-sam.js"></script>
  <script src="data/parks-visited-ellie.js"></script>
  <script src="data/parks-visited-tilly.js"></script>
  <script src="data/parks-visited-poppy.js"></script>

  <!-- App logic -->
  <script src="js/app.js"></script>

</body>
</html>
