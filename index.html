<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Cuzzorts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The Cuzzorts — baseball, travels, and turkey hunting.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a2e3b;
      color: #fff;
      text-align: center;
      padding: 3.5rem 1rem 3rem;
    }

    header h1 {
      font-family: 'Kreon', serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: #a8bfc9;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      padding: 3rem 1rem 2rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      display: block;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 2rem 1.75rem 1.75rem;
      text-decoration: none;
      color: inherit;
      border-top: 5px solid #ccc;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.13);
    }

    .card-baseball { border-top-color: #003087; }
    .card-travels  { border-top-color: #E8A020; }
    .card-turkeys  { border-top-color: #22703D; }

    .card-icon {
      font-size: 2.25rem;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .card h2 {
      font-family: 'Kreon', serif;
      font-size: 1.5rem;
      color: #1a2e3b;
      margin-bottom: 0.4rem;
    }

    .card p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    footer {
      text-align: center;
      color: #aaa;
      padding: 1.5rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>The Cuzzorts</h1>
    <p>Josh &amp; Samantha</p>
  </header>

  <main>
    <div class="card-grid">

      <a class="card card-baseball" href="baseball/index.html">
        <div class="card-icon">&#9918;</div>
        <h2>Baseball</h2>
        <p>30 of 30 MLB ballparks visited</p>
      </a>

      <a class="card card-travels" href="travels/index.html">
        <div class="card-icon">&#128506;</div>
        <h2>Travels</h2>
        <p>States &amp; countries explored by the family</p>
      </a>

      <a class="card card-turkeys" href="turkeys/index.html">
        <div class="card-icon">&#129411;</div>
        <h2>Turkey Hunting</h2>
        <p>Harvest maps across the country</p>
      </a>

    </div>
  </main>

  <footer>
    <p><script>document.write(new Date().getFullYear())</script> &copy; The Cuzzorts</p>
  </footer>

  <script>
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
    ga('create', 'UA-41704206-1', 'thecuzzorts.com');
    ga('send', 'pageview');
  </script>

</body>
</html>
