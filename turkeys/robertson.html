<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="css/jquery-jvectormap-2.0.3.css">

<body>

  <header>
    <h1><a href="../index.html" class="home-link">The Robertsons</a> &mdash; Turkey Hunting</h1>
  </header>

  <main>

    <p class="section-heading">By Person</p>
    <div class="person-grid grid-2col">

      <div class="person-card" data-person="jack">
        <h2>Jack</h2>
        <p class="count"><span id="jackTotal">0</span> of 49 states</p>

          <div id="jackTurkeys" class="map"></div>
        </div>
      </div>

      <div class="person-card" data-person="debbie">
        <h2>Debbie</h2>
        <p class="count"><span id="debbieTotal">0</span> of 49 states</p>
        <div class="map-container us-map">
          <div id="debbieTurkeys" class="map"></div>
        </div>
      </div>

    </div>

  </main>

  <footer>
    <p><span id="currentYear"></span> &copy; The Cuzzorts &mdash; <a href="../index.html">Home</a></p>
  </footer>

  <script src="data/turkeys-harvested-josh.js"></script>
