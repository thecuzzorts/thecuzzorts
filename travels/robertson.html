<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travels — TheCuzzorts.com</title>
  <link rel="stylesheet" href="css/jquery-jvectormap-2.0.3.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1><a href="../index.html" class="home-link">The Robertsons</a> &mdash; Travels</h1>
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="states" role="tab" aria-selected="true">States</button>
      <button class="tab-btn" data-tab="countries" role="tab" aria-selected="false">Countries</button>
    </nav>
  </header>

  <main>

    <!-- ======== STATES TAB ======== -->
    <section id="states" class="tab-section active" role="tabpanel">

      <p class="section-heading">By Person</p>
      <div class="person-grid grid-2col">

        <div class="person-card" data-person="jack">
          <h2>Jack</h2>
          <p class="count"><span id="jackStatesTotal">0</span> of 50</p>
          <div class="map-container us-map">
            <div id="jackStatesMap" class="map"></div>
          </div>
        </div>

        <div class="person-card" data-person="debbie">
          <h2>Deb</h2>
          <p class="count"><span id="debbieStatesTotal">0</span> of 50</p>
          <div class="map-container us-map">
            <div id="debbieStatesMap" class="map"></div>
          </div>
        </div>

      </div>

    </section>

    <!-- ======== COUNTRIES TAB ======== -->
    <section id="countries" class="tab-section" role="tabpanel">

      <p class="section-heading">By Person</p>
      <div class="person-grid grid-2col">

        <div class="person-card" data-person="jack">
          <h2>Jack</h2>
          <p class="count"><span id="jackCountriesTotal">0</span> countries</p>
          <div class="map-container world-map">
            <div id="jackCountriesMap" class="map"></div>
          </div>
        </div>

        <div class="person-card" data-person="debbie">
          <h2>Deb</h2>
          <p class="count"><span id="debbieCountriesTotal">0</span> countries</p>
          <div class="map-container world-map">
            <div id="debbieCountriesMap" class="map"></div>
          </div>
        </div>

      </div>

    </section>

  </main>

  <footer>
    <p><span id="currentYear"></span> &copy; The Cuzzorts &mdash; <a href="../index.html">Home</a></p>
  </footer>

  <!-- Scripts -->
  <script src="js/vendor/jquery-1.12.0.min.js"></script>
  <script src="js/jquery-jvectormap-2.0.3.min.js"></script>
  <script src="js/jquery-jvectormap-us-lcc.js"></script>
  <script src="js/jquery-jvectormap-world-mill.js"></script>

  <!-- State data -->
  <script src="data/states-visited-josh.js"></script>
  <script src="data/states-visited-sam.js"></script>
  <script src="data/states-visited-ellie.js"></script>
  <script src="data/states-visited-tilly.js"></script>
  <script src="data/states-visited-poppy.js"></script>
  <script src="data/states-visited-jack.js"></script>
  <script src="data/states-visited-debbie.js"></script>

  <!-- Country data -->
  <script src="data/countries-visited-josh.js"></script>
  <script src="data/countries-visited-sam.js"></script>
  <script src="data/countries-visited-ellie.js"></script>
  <script src="data/countries-visited-tilly.js"></script>
  <script src="data/countries-visited-poppy.js"></script>
  <script src="data/countries-visited-jack.js"></script>
  <script src="data/countries-visited-debbie.js"></script>

  <!-- App logic -->
  <script src="js/app.js"></script>

</body>
</html>
